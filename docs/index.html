<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolutive Coinduction Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #e2e2e2;
            --text-secondary: #a0a0b0;
            --accent-success: #00d4aa;
            --accent-error: #ff6b6b;
            --accent-warning: #ffd93d;
            --accent-info: #6c63ff;
            --border: #2a2a3a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--accent-info);
            display: inline-block;
        }

        .header .subtitle {
            color: var(--text-secondary);
            margin-top: 0.25rem;
            font-size: 0.85rem;
        }

        .app-container {
            display: grid;
            grid-template-columns: 380px 1fr 400px;
            gap: 0.75rem;
            padding: 1rem;
            min-height: calc(100vh - 80px);
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--bg-tertiary);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .panel-content {
            padding: 1rem;
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 140px);
        }

        .editor {
            background: #0a0a0f;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.4;
            border: 1px solid var(--border);
            width: 100%;
            resize: vertical;
            color: var(--text-primary);
            padding: 0.75rem;
        }

        textarea.editor {
            min-height: 200px;
        }

        .btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent-info);
            border-color: var(--accent-info);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(0.9);
        }

        .btn-success {
            background: var(--accent-success);
            border-color: var(--accent-success);
            color: #0f0f1a;
        }

        .btn-secondary:hover {
            border-color: var(--accent-info);
        }

        .stream-card {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent-info);
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
        }

        .stream-card.guarded-success {
            border-left-color: var(--accent-success);
        }

        .stream-card.guarded-fail {
            border-left-color: var(--accent-error);
        }

        .stream-card.latest {
            background: rgba(0, 212, 170, 0.08);
        }

        .stream-card.divergent {
            border-left-color: var(--accent-error);
            background: rgba(255, 107, 107, 0.08);
        }

        .step-badge {
            background: var(--bg-primary);
            padding: 0.15rem 0.5rem;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 0.35rem;
        }

        .value-display {
            font-size: 1rem;
            font-weight: 500;
            margin: 0.35rem 0;
        }

        .value-display code {
            background: var(--bg-primary);
            padding: 0.15rem 0.35rem;
            font-size: 0.85rem;
        }

        .guarded-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.4rem;
            margin-left: 0.5rem;
        }

        .stream-prefix {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
        }

        .comparison-result {
            padding: 0.5rem;
            margin: 0.75rem 0;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid;
        }

        .comparison-result.success {
            background: rgba(0, 212, 170, 0.1);
            border-color: var(--accent-success);
            color: var(--accent-success);
        }

        .comparison-result.failure {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--accent-error);
            color: var(--accent-error);
        }

        select, input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 0.4rem 0.6rem;
            color: var(--text-primary);
            width: 100%;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .slider {
            width: 100%;
            margin: 0.5rem 0;
        }

        .controls {
            display: flex;
            gap: 0.35rem;
            align-items: center;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .export-options, .oeis-panel {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        .method-tree {
            background: var(--bg-tertiary);
            padding: 0.75rem;
            font-size: 0.75rem;
        }

        .tree-node {
            margin-left: 1.2rem;
            position: relative;
        }

        .tree-node::before {
            content: '├─';
            position: absolute;
            left: -1rem;
            color: var(--accent-info);
        }

        .tree-root {
            font-weight: 700;
            color: var(--accent-success);
            margin-bottom: 0.5rem;
        }

        .tree-label {
            font-weight: 600;
            color: var(--accent-warning);
        }

        .status-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 1px;
            margin-right: 6px;
        }

        .status-productive { background: var(--accent-success); }
        .status-unguarded { background: var(--accent-error); }
        .status-unknown { background: var(--accent-warning); }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔄 Resolutive Coinduction Explorer</h1>
        <div class="subtitle">Interactive Bisimulation · Guardedness Checking · OEIS Integration</div>
    </div>

    <div class="app-container">
        <!-- Left Panel: Editor -->
        <div class="panel">
            <div class="panel-header">
                <span>📝 Stream Definitions</span>
                <button class="btn btn-secondary" id="loadExampleBtn">📚 Example</button>
            </div>
            <div class="panel-content">
                <textarea id="streamEditor" class="editor" rows="10" placeholder='Define streams as valid JS object...'></textarea>
                <div class="controls" style="margin-top: 0.75rem;">
                    <button class="btn btn-primary" id="runStreamsBtn">▶ Run & Check</button>
                    <button class="btn btn-secondary" id="clearStreamsBtn">🗑 Clear</button>
                </div>
                
                <!-- OEIS Panel -->
                <div class="oeis-panel">
                    <input type="text" id="oeisId" placeholder="OEIS ID (e.g., A000045)" style="flex: 1;">
                    <button class="btn btn-secondary" id="fetchOeisBtn">🔢 Fetch from OEIS</button>
                </div>
                
                <div id="streamList" style="margin-top: 0.75rem;"></div>
            </div>
        </div>

        <!-- Middle Panel: Bisimulation -->
        <div class="panel">
            <div class="panel-header">
                <span>🔍 Bisimulation Checker</span>
                <button class="btn btn-secondary" id="checkGuardednessBtn">🛡️ Check All Guardedness</button>
            </div>
            <div class="panel-content">
                <select id="leftStreamSelect">
                    <option value="">Select Left Stream</option>
                </select>
                <select id="rightStreamSelect">
                    <option value="">Select Right Stream</option>
                </select>
                <button class="btn btn-primary" id="compareBtn" style="width: 100%;">🔗 Compare</button>
                
                <div id="comparisonResult"></div>
                <div id="guardednessResult" style="font-size: 0.8rem; margin-top: 0.5rem;"></div>
                
                <div id="visualizer">
                    <div class="controls">
                        <button id="playBtn" class="btn btn-secondary">▶</button>
                        <button id="stopBtn" class="btn btn-secondary">⏸</button>
                        <button id="resetBtn" class="btn btn-secondary">↺</button>
                        <select id="speedSelect">
                            <option value="100">Fast</option>
                            <option value="500" selected>Normal</option>
                            <option value="1000">Slow</option>
                        </select>
                    </div>
                    <input type="range" id="stepSlider" class="slider" min="0" max="0" value="0">
                    <div id="streamPrefix" class="stream-prefix"></div>
                </div>

                <div class="export-options">
                    <button class="btn btn-secondary" id="exportJsonBtn">📄 JSON</button>
                    <button class="btn btn-secondary" id="exportAgdaBtn">📐 Agda</button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Method Tree -->
        <div class="panel">
            <div class="panel-header">
                <span>🌳 Method Tree & Inference</span>
                <button class="btn btn-secondary" id="inferRelationsBtn">✨ Infer</button>
            </div>
            <div class="panel-content">
                <div id="methodTree" class="method-tree"></div>
                <details style="margin-top: 0.75rem;">
                    <summary style="cursor: pointer; font-size: 0.8rem;">Inferred Relations</summary>
                    <div id="relationsList" style="margin-top: 0.5rem; font-size: 0.7rem;"></div>
                </details>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // Core Classes
        // ============================================
        class ResStream {
            constructor(name, seed, stepFn) {
                this.name = name;
                this.seed = seed;
                this.stepFn = stepFn;
                this.cache = new Map();
                this.guardedness = null;
            }
            
            step(s) {
                if (!this.cache.has(s)) {
                    this.cache.set(s, this.stepFn(s));
                }
                return this.cache.get(s);
            }
            
            take(n) {
                const result = [];
                let seed = this.seed;
                for (let i = 0; i < n; i++) {
                    const [val, next] = this.step(seed);
                    result.push(val);
                    seed = next;
                }
                return result;
            }
        }
        
        // ============================================
        // FULL GUARDEDNESS CHECKER
        // ============================================
        class GuardednessChecker {
            constructor() {
                this.constructors = ['Cons', '::', '∷', 'Stream', 'delay'];
                this.guardedPatterns = [
                    { pattern: /\[([^,\]]+),\s*\(\)\s*=>\s*(\w+)/, desc: "Thunk-wrapped recursive call" },
                    { pattern: /return\s+\[[^,]+,\s*\(\)\s*=>/, desc: "Return under constructor" },
                    { pattern: /∷\s*\(/, desc: "Cons operator guard" }
                ];
            }
            
            checkStream(stream) {
                const result = {
                    name: stream.name,
                    productive: false,
                    issues: [],
                    score: 0
                };
                
                const stepStr = stream.stepFn.toString();
                
                // Check 1: Does step return an array with constructor?
                const hasArrayReturn = /return\s*\[/.test(stepStr) || /=>\s*\[/.test(stepStr);
                if (!hasArrayReturn) {
                    result.issues.push("Step function does not return array [value, next]");
                } else {
                    result.score += 20;
                }
                
                // Check 2: Is recursive call under a thunk (() => ...)?
                const hasThunk = /\(\)\s*=>/.test(stepStr);
                const hasLambda = /=>\s*\w+/.test(stepStr);
                if (hasThunk || hasLambda) {
                    result.score += 40;
                } else {
                    const recursiveCall = new RegExp(`${stream.name}\\s*\\(`, 'i');
                    if (recursiveCall.test(stepStr)) {
                        result.issues.push("Direct recursive call without thunk wrapper — may cause infinite loop");
                    }
                }
                
                // Check 3: Detect value production before recursion
                const hasValueBeforeRecur = /return\s*\[[^,\]]+,\s*/.test(stepStr);
                if (hasValueBeforeRecur) {
                    result.score += 30;
                }
                
                // Check 4: Semantic simulation (run a few steps safely)
                try {
                    let seed = stream.seed;
                    let stepsRun = 0;
                    let maxTestSteps = 10;
                    let hung = false;
                    
                    const timeout = setTimeout(() => { hung = true; }, 100);
                    
                    for (let i = 0; i < maxTestSteps && !hung; i++) {
                        const [val, next] = stream.step(seed);
                        if (val === undefined && next === undefined) {
                            result.issues.push(`Step ${i} produced undefined`);
                            break;
                        }
                        seed = next;
                        stepsRun++;
                    }
                    
                    clearTimeout(timeout);
                    
                    if (!hung && stepsRun === maxTestSteps) {
                        result.score += 10;
                        result.productive = result.score >= 60;
                    } else if (hung) {
                        result.issues.push("Possible non-termination — step function may not be productive");
                    } else {
                        result.productive = result.score >= 50;
                    }
                } catch(e) {
                    result.issues.push(`Runtime error: ${e.message}`);
                }
                
                result.productive = result.score >= 60;
                return result;
            }
            
            getAllStatus(streams) {
                const results = [];
                for (const stream of streams.values()) {
                    const check = this.checkStream(stream);
                    stream.guardedness = check;
                    results.push(check);
                }
                return results;
            }
        }
        
        // ============================================
        // OEIS Integration
        // ============================================
        class OEISFetcher {
            async fetchSequence(id) {
                // Normalize ID: A000045 -> A000045
                const normId = id.toUpperCase().replace(/[^A-Z0-9]/g, '');
                if (!normId.startsWith('A') || normId.length < 2) {
                    throw new Error('Invalid OEIS ID. Use format like A000045');
                }
                
                // Use OEIS CORS proxy
                const url = `https://oeis.org/${normId}/b${normId.toLowerCase()}.txt`;
                
                try {
                    const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
                    if (!response.ok) throw new Error('Sequence not found');
                    
                    const text = await response.text();
                    const terms = [];
                    const lines = text.split('\n');
                    
                    for (const line of lines) {
                        const match = line.match(/^\d+\s+(-?\d+)/);
                        if (match && terms.length < 20) {
                            terms.push(parseInt(match[1]));
                        }
                    }
                    
                    if (terms.length === 0) throw new Error('No terms found');
                    return terms;
                } catch(e) {
                    // Fallback: use JSON API
                    const jsonUrl = `https://oeis.org/search?q=id:${normId}&fmt=json`;
                    try {
                        const resp = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(jsonUrl)}`);
                        const data = JSON.parse(resp);
                        if (data.results && data.results[0]) {
                            const seqStr = data.results[0].data;
                            const terms = seqStr.split(',').slice(0, 20).map(Number);
                            return terms;
                        }
                    } catch(e2) {
                        throw new Error(`Cannot fetch ${normId}: ${e.message}`);
                    }
                    throw e;
                }
            }
            
            createStreamFromTerms(name, terms) {
                // Create a stream that yields terms from OEIS
                const seed = { index: 0, terms };
                const stepFn = (seed) => {
                    const value = seed.terms[seed.index % seed.terms.length];
                    const nextSeed = { index: seed.index + 1, terms: seed.terms };
                    return [value, nextSeed];
                };
                return { name, seed, stepFn };
            }
        }
        
        // ============================================
        // Parser
        // ============================================
        function parseStreamsFromCode(code) {
            const result = {};
            const cleanCode = code.replace(/\/\/.*$/gm, '');
            
            // Match const name = { seed: ..., step: ... }
            const objRegex = /const\s+(\w+)\s*=\s*\{\s*seed:\s*([^,]+),?\s*step:\s*\(([^)]+)\)\s*=>\s*\[\s*([^,]+),\s*([^\]]+)\s*\]\s*\}/g;
            
            let match;
            while ((match = objRegex.exec(cleanCode)) !== null) {
                const name = match[1];
                const seedStr = match[2].trim();
                const params = match[3].trim();
                const valExpr = match[4].trim();
                const nextExpr = match[5].trim();
                
                let seed;
                try {
                    seed = Function(`"use strict"; return (${seedStr})`)();
                } catch(e) { continue; }
                
                const stepFn = new Function(params, `return [${valExpr}, ${nextExpr}];`);
                result[name] = { seed, step: stepFn };
            }
            
            return result;
        }
        
        // ============================================
        // Bisimulation Prover
        // ============================================
        class BisimulationProver {
            prove(stream1, stream2, maxSteps = 100) {
                const visited = new Set();
                const queue = [[stream1.seed, stream2.seed]];
                const path = [];
                
                while (queue.length && path.length < maxSteps) {
                    const [s1, s2] = queue.shift();
                    const key = `${JSON.stringify(s1)}|${JSON.stringify(s2)}`;
                    
                    if (visited.has(key)) continue;
                    visited.add(key);
                    
                    const [v1, n1] = stream1.step(s1);
                    const [v2, n2] = stream2.step(s2);
                    
                    path.push({ step: path.length, v1, v2 });
                    
                    if (v1 !== v2) {
                        return { bisimilar: false, counterexample: path[path.length - 1], stepsChecked: visited.size };
                    }
                    queue.push([n1, n2]);
                }
                return { bisimilar: true, stepsChecked: visited.size };
            }
        }
        
        // ============================================
        // Global State
        // ============================================
        const streams = new Map();
        let currentComparison = null;
        let animationInterval = null;
        let currentStep = 0;
        let snapshots = [];
        
        const oeisFetcher = new OEISFetcher();
        const guardednessChecker = new GuardednessChecker();
        const bisimProver = new BisimulationProver();
        
        // ============================================
        // UI Functions
        // ============================================
        function updateStreamList() {
            const container = document.getElementById('streamList');
            if (streams.size === 0) {
                container.innerHTML = '<div class="stream-card" style="color: var(--text-secondary); text-align: center;">No streams loaded.</div>';
                return;
            }
            
            container.innerHTML = Array.from(streams.values()).map(stream => {
                const guarded = stream.guardedness;
                const statusClass = guarded?.productive ? 'guarded-success' : (guarded ? 'guarded-fail' : '');
                const statusIcon = guarded?.productive ? '✓' : (guarded ? '⚠' : '?');
                return `
                    <div class="stream-card ${statusClass}">
                        <div class="step-badge">
                            📊 ${stream.name}
                            <span class="guarded-badge">${statusIcon} ${guarded?.productive ? 'Guarded' : (guarded ? 'Check Failed' : 'Unknown')}</span>
                        </div>
                        <div class="value-display">
                            Prefix: <code>[${stream.take(5).join(', ')}...]</code>
                        </div>
                        ${guarded?.issues?.length ? `<div style="font-size:0.7rem; color:var(--accent-error);">${guarded.issues[0]}</div>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function updateSelectors() {
            const leftSelect = document.getElementById('leftStreamSelect');
            const rightSelect = document.getElementById('rightStreamSelect');
            const options = Array.from(streams.keys()).map(name => `<option value="${name}">${name}</option>`).join('');
            
            leftSelect.innerHTML = '<option value="">Left Stream</option>' + options;
            rightSelect.innerHTML = '<option value="">Right Stream</option>' + options;
        }
        
        function updateGuardednessDisplay() {
            const results = guardednessChecker.getAllStatus(streams);
            const productive = results.filter(r => r.productive).length;
            const container = document.getElementById('guardednessResult');
            if (streams.size === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = `
                <div style="padding: 0.5rem; background: var(--bg-tertiary);">
                    <strong>🛡️ Guardedness Summary:</strong> ${productive}/${streams.size} productive streams
                    ${productive === streams.size ? ' ✓ All guarded' : ' ⚠ Some streams may not be productive'}
                </div>
            `;
            updateStreamList();
        }
        
        function generateSnapshots(left, right, maxSteps) {
            snapshots = [];
            let s1 = left.seed;
            let s2 = right.seed;
            
            for (let i = 0; i < maxSteps; i++) {
                try {
                    const [v1, n1] = left.step(s1);
                    const [v2, n2] = right.step(s2);
                    snapshots.push({ step: i, v1, v2, match: v1 === v2 });
                    s1 = n1;
                    s2 = n2;
                } catch(e) {
                    break;
                }
            }
            
            const slider = document.getElementById('stepSlider');
            slider.max = Math.max(0, snapshots.length - 1);
            currentStep = 0;
            updateVisualizer();
        }
        
        function updateVisualizer() {
            const container = document.getElementById('streamPrefix');
            if (!snapshots.length) {
                container.innerHTML = '<div style="color: var(--text-secondary);">Run a comparison first</div>';
                return;
            }
            
            const html = snapshots.slice(0, currentStep + 1).map((s, idx) => `
                <div class="stream-card ${idx === currentStep ? 'latest' : ''} ${!s.match ? 'divergent' : ''}" style="min-width: 100px;">
                    <div class="step-badge">#${s.step}</div>
                    <div class="value-display">
                        <div>L: <code>${JSON.stringify(s.v1)}</code></div>
                        <div>R: <code>${JSON.stringify(s.v2)}</code></div>
                        ${!s.match ? '<span style="color: var(--accent-error);">✗</span>' : '✓'}
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
            document.getElementById('stepSlider').value = currentStep;
        }
        
        // ============================================
        // Event Handlers
        // ============================================
        document.getElementById('loadExampleBtn').onclick = () => {
            const exampleText = `// Fibonacci stream
const fibonacci = {
    seed: [0, 1],
    step: ([a, b]) => [a, [b, a + b]]
};

// All zeros
const zeros = {
    seed: 0,
    step: (s) => [0, s]
};

// Natural numbers
const naturals = {
    seed: 0,
    step: (n) => [n, n + 1]
};

// Guarded stream (proper thunk)
const guardedExample = {
    seed: 0,
    step: (n) => [n, () => guardedExample.step(n + 1)]
};`;
            document.getElementById('streamEditor').value = exampleText;
        };
        
        document.getElementById('runStreamsBtn').onclick = () => {
            try {
                const code = document.getElementById('streamEditor').value;
                const defs = parseStreamsFromCode(code);
                
                streams.clear();
                for (const [name, def] of Object.entries(defs)) {
                    if (def.seed !== undefined && def.step) {
                        streams.set(name, new ResStream(name, def.seed, def.step));
                    }
                }
                
                if (streams.size === 0) {
                    alert('No valid streams found. Use format:\nconst name = { seed: value, step: (param) => [value, next] }');
                }
                
                updateGuardednessDisplay();
                updateSelectors();
                document.getElementById('comparisonResult').innerHTML = '';
                document.getElementById('streamPrefix').innerHTML = '';
                snapshots = [];
            } catch(e) {
                console.error(e);
                alert('Error parsing: ' + e.message);
            }
        };
        
        document.getElementById('checkGuardednessBtn').onclick = () => {
            if (streams.size === 0) {
                alert('Load streams first');
                return;
            }
            updateGuardednessDisplay();
        };
        
        document.getElementById('clearStreamsBtn').onclick = () => {
            streams.clear();
            updateStreamList();
            updateSelectors();
            document.getElementById('comparisonResult').innerHTML = '';
            document.getElementById('guardednessResult').innerHTML = '';
            document.getElementById('streamPrefix').innerHTML = '';
            snapshots = [];
        };
        
        document.getElementById('fetchOeisBtn').onclick = async () => {
            const oeisId = document.getElementById('oeisId').value.trim();
            if (!oeisId) {
                alert('Enter OEIS ID like A000045');
                return;
            }
            
            try {
                const terms = await oeisFetcher.fetchSequence(oeisId);
                const streamName = `seq_${oeisId.toLowerCase()}`;
                const { name, seed, stepFn } = oeisFetcher.createStreamFromTerms(streamName, terms);
                streams.set(name, new ResStream(name, seed, stepFn));
                updateGuardednessDisplay();
                updateSelectors();
                document.getElementById('streamEditor').value += `\n\n// Fetched from OEIS ${oeisId}\nconst ${name} = {\n    seed: { index: 0, terms: [${terms.slice(0, 10).join(', ')}] },\n    step: (seed) => [seed.terms[seed.index % seed.terms.length], { index: seed.index + 1, terms: seed.terms }]\n};`;
                alert(`Loaded ${terms.length} terms from OEIS ${oeisId}`);
            } catch(e) {
                alert('Error fetching from OEIS: ' + e.message);
            }
        };
        
        document.getElementById('compareBtn').onclick = () => {
            const leftName = document.getElementById('leftStreamSelect').value;
            const rightName = document.getElementById('rightStreamSelect').value;
            
            if (!leftName || !rightName || !streams.has(leftName) || !streams.has(rightName)) {
                alert('Please select both streams');
                return;
            }
            
            const left = streams.get(leftName);
            const right = streams.get(rightName);
            
            const result = bisimProver.prove(left, right, 100);
            currentComparison = { left, right, result, leftName, rightName };
            
            const resultDiv = document.getElementById('comparisonResult');
            if (result.bisimilar) {
                resultDiv.innerHTML = `
                    <div class="comparison-result success">
                        ✓ BISIMILAR · Checked ${result.stepsChecked} steps
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="comparison-result failure">
                        ✗ DIVERGENT at step ${result.counterexample.step}<br>
                        <small>${leftName}: ${JSON.stringify(result.counterexample.v1)} ≠ ${rightName}: ${JSON.stringify(result.counterexample.v2)}</small>
                    </div>
                `;
            }
            
            generateSnapshots(left, right, 50);
        };
        
        // Animation controls
        document.getElementById('playBtn').onclick = () => {
            if (animationInterval) clearInterval(animationInterval);
            const speed = parseInt(document.getElementById('speedSelect').value);
            if (snapshots.length === 0) return;
            animationInterval = setInterval(() => {
                if (currentStep < snapshots.length - 1) {
                    currentStep++;
                    updateVisualizer();
                } else {
                    clearInterval(animationInterval);
                    animationInterval = null;
                }
            }, speed);
        };
        
        document.getElementById('stopBtn').onclick = () => {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
        };
        
        document.getElementById('resetBtn').onclick = () => {
            currentStep = 0;
            updateVisualizer();
        };
        
        document.getElementById('stepSlider').oninput = (e) => {
            currentStep = parseInt(e.target.value);
            updateVisualizer();
        };
        
        document.getElementById('exportJsonBtn').onclick = () => {
            if (!currentComparison) {
                alert('Run a comparison first');
                return;
            }
            const cert = {
                type: 'bisimulation_certificate',
                streams: { left: currentComparison.leftName, right: currentComparison.rightName },
                result: currentComparison.result,
                guardedness: {
                    left: streams.get(currentComparison.leftName)?.guardedness,
                    right: streams.get(currentComparison.rightName)?.guardedness
                },
                timestamp: new Date().toISOString(),
                snapshots: snapshots
            };
            const blob = new Blob([JSON.stringify(cert, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bisim_${currentComparison.leftName}_${currentComparison.rightName}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };
        
        document.getElementById('exportAgdaBtn').onclick = () => {
            if (!currentComparison) {
                alert('Run a comparison first');
                return;
            }
            const agdaCode = `module Bisim_${currentComparison.leftName}_${currentComparison.rightName} where

open import Coinduction
open import Data.Nat

-- Status: ${currentComparison.result.bisimilar ? 'BISIMILAR ✓' : 'NOT BISIMILAR ✗'}
-- Checked ${currentComparison.result.stepsChecked} steps
-- Guardedness: ${streams.get(currentComparison.leftName)?.guardedness?.productive ? 'Left productive' : 'Left may not be productive'}

postulate
  left right : Stream ℕ
  bisim : left ≈ right
`;
            const blob = new Blob([agdaCode], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bisim_${currentComparison.leftName}_${currentComparison.rightName}.agda`;
            a.click();
            URL.revokeObjectURL(url);
        };
        
        document.getElementById('inferRelationsBtn').onclick = () => {
            const leftName = document.getElementById('leftStreamSelect').value;
            const rightName = document.getElementById('rightStreamSelect').value;
            
            if (!leftName || !rightName || !streams.has(leftName) || !streams.has(rightName)) {
                alert('Select both streams first');
                return;
            }
            
            const left = streams.get(leftName);
            const right = streams.get(rightName);
            const relations = [];
            const visited = new Set();
            const queue = [[left.seed, right.seed]];
            
            while (queue.length && relations.length < 20) {
                const [s1, s2] = queue.shift();
                const key = `${JSON.stringify(s1)}|${JSON.stringify(s2)}`;
                if (visited.has(key)) continue;
                visited.add(key);
                
                const [v1, n1] = left.step(s1);
                const [v2, n2] = right.step(s2);
                
                relations.push({
                    leftSeed: JSON.stringify(s1).slice(0, 40),
                    rightSeed: JSON.stringify(s2).slice(0, 40),
                    leftValue: v1,
                    rightValue: v2,
                    match: v1 === v2
                });
                
                queue.push([n1, n2]);
            }
            
            const container = document.getElementById('relationsList');
            container.innerHTML = relations.map(r => `
                <div style="padding: 0.3rem; border-bottom: 1px solid var(--border);">
                    <span style="color: ${r.match ? 'var(--accent-success)' : 'var(--accent-error)'}">${r.match ? '✓' : '✗'}</span>
                    ${r.leftSeed}… → ${r.leftValue} | ${r.rightSeed}… → ${r.rightValue}
                </div>
            `).join('');
        };
        
        function populateMethodTree() {
            const treeHtml = `
                <div class="tree-root">📐 Resolutive Coinduction Method</div>
                <div class="tree-node"><span class="tree-label">Layer 1: Foundation</span>
                    <div class="tree-node">νX.F(X) — Greatest Fixed Point</div>
                    <div class="tree-node">μX.F(X) — Least Fixed Point</div>
                    <div class="tree-node">Positivity / Monotonicity</div>
                </div>
                <div class="tree-node"><span class="tree-label">Layer 2: Core Rules</span>
                    <div class="tree-node">νR-strong — Corecursion with seed witness</div>
                    <div class="tree-node">Guardedness: recursive calls under constructors/thunks</div>
                    <div class="tree-node">Productivity certificate</div>
                </div>
                <div class="tree-node"><span class="tree-label">Layer 3: Computation</span>
                    <div class="tree-node">Curry–Howard: Corecursion as program</div>
                    <div class="tree-node">Monad: S → A × T(S) × S</div>
                    <div class="tree-node">Bisimulation as seed equality</div>
                </div>
                <div class="tree-node"><span class="tree-label">Layer 4: Proof Methods</span>
                    <div class="tree-node">Bisimulation congruence</div>
                    <div class="tree-node">Coinduction principle: F(Y) ⊢ Y ⇒ νX.F(X) ⊢ Y</div>
                    <div class="tree-node">Induction for least fixed points</div>
                </div>
                <div class="tree-node"><span class="tree-label">Layer 5: Implementation ✓</span>
                    <div class="tree-node">✓ Guardedness checker (syntactic + semantic)</div>
                    <div class="tree-node">✓ Bisimulation prover (semi-automatic)</div>
                    <div class="tree-node">✓ Visualizer — stream prefix explorer</div>
                    <div class="tree-node">✓ Certificate export (JSON / Agda)</div>
                    <div class="tree-node">✓ OEIS integration</div>
                </div>
                <div class="tree-node"><span class="tree-label">Layer 6: Applications</span>
                    <div class="tree-node">Stream equivalence (infinite data)</div>
                    <div class="tree-node">Process calculus bisimulations</div>
                    <div class="tree-node">Liveness properties (temporal logic)</div>
                </div>
                <div class="tree-node"><span class="tree-label">Next Steps</span>
                    <div class="tree-node">🔜 Full Coq/Agda backend integration</div>
                    <div class="tree-node">🔜 WASM runtime for performance</div>
                    <div class="tree-node">🔜 ML-based bisimulation discovery</div>
                    <div class="tree-node">🔜 Temporal logic model checking</div>
                </div>
            `;
            document.getElementById('methodTree').innerHTML = treeHtml;
        }
        
        populateMethodTree();
        
        // Auto-load example on startup
        setTimeout(() => {
            document.getElementById('loadExampleBtn').click();
            setTimeout(() => document.getElementById('runStreamsBtn').click(), 100);
        }, 100);
    </script>
</body>
</html>
