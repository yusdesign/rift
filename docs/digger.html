<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEIS Research Tool | Three Modes · Sequence Explorer · Bisimilarity · Combinatorial Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #e2e2e2;
            --text-secondary: #a0a0b0;
            --accent-success: #00d4aa;
            --accent-error: #ff6b6b;
            --accent-warning: #ffd93d;
            --accent-info: #6c63ff;
            --border: #2a2a3a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; }
        .header h1 { font-size: 1.4rem; color: var(--accent-info); }
        .header .subtitle { color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.2rem; }
        
        .mode-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; background: var(--bg-secondary); padding: 0.5rem; border: 1px solid var(--border); }
        .mode-btn { flex: 1; padding: 0.5rem; background: var(--bg-tertiary); border: 1px solid var(--border); cursor: pointer; text-align: center; font-weight: 600; }
        .mode-btn.active { background: var(--accent-info); border-color: var(--accent-info); }
        
        .app-container { display: grid; grid-template-columns: 350px 1fr; gap: 1rem; padding: 1rem; }
        .panel { background: var(--bg-secondary); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { background: var(--bg-tertiary); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-weight: 600; }
        .panel-content { padding: 0.75rem; flex: 1; overflow-y: auto; max-height: calc(100vh - 180px); }
        
        .btn { padding: 0.3rem 0.6rem; background: var(--bg-tertiary); border: 1px solid var(--border); cursor: pointer; font-size: 0.75rem; color: var(--text-primary); }
        .btn-primary { background: var(--accent-info); border-color: var(--accent-info); color: white; }
        
        input, select, textarea { background: var(--bg-tertiary); border: 1px solid var(--border); padding: 0.3rem; color: var(--text-primary); width: 100%; margin-bottom: 0.5rem; font-size: 0.75rem; }
        
        .sequence-card { background: var(--bg-tertiary); padding: 0.5rem; margin-bottom: 0.5rem; border-left: 3px solid var(--accent-info); cursor: pointer; }
        .sequence-card:hover { transform: translateX(3px); background: rgba(108,99,255,0.1); }
        
        .cluster-card { background: var(--bg-tertiary); padding: 0.5rem; margin-bottom: 0.5rem; border-left: 3px solid var(--accent-success); }
        .cluster-members { font-size: 0.7rem; margin-top: 0.3rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .cluster-tag { background: var(--bg-primary); padding: 0.15rem 0.4rem; font-size: 0.6rem; cursor: pointer; }
        
        .generating-function { font-family: monospace; font-size: 0.7rem; background: var(--bg-primary); padding: 0.5rem; margin-top: 0.5rem; overflow-x: auto; }
        
        canvas { width: 100%; height: 100px; background: #0a0a0f; margin: 0.5rem 0; }
        
        @media (max-width: 800px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 OEIS Research Tool</h1>
        <div class="subtitle">Three Modes: Sequence Explorer · Bisimilarity Mining · Combinatorial Web</div>
    </div>
    
    <div class="mode-selector">
        <div class="mode-btn active" data-mode="explorer">🌊 Sequence Explorer</div>
        <div class="mode-btn" data-mode="bisimilarity">🔗 Bisimilarity Mining</div>
        <div class="mode-btn" data-mode="combinatorial">📐 Combinatorial Web</div>
    </div>
    
    <div class="app-container">
        <!-- Left Panel: Input & Controls -->
        <div class="panel">
            <div class="panel-header">🎮 Controls</div>
            <div class="panel-content" id="controlsPanel">
                <!-- Dynamic controls per mode -->
            </div>
        </div>
        
        <!-- Right Panel: Results -->
        <div class="panel">
            <div class="panel-header">📊 Results</div>
            <div class="panel-content" id="resultsPanel">
                <div style="text-align: center; color: var(--text-secondary);">Select a mode and enter a query</div>
            </div>
        </div>
    </div>
    
    <script src="oeis-loader.js"></script>
    <script>
        // Initialize OEIS Loader
        const oeis = new OEISLoader('oeis/');
        let currentMode = 'explorer';
        
        // ============================================
        // Mode 1: Sequence Explorer
        // ============================================
        function showExplorerControls() {
            return `
                <input type="text" id="seqId" placeholder="OEIS ID (A000045, A000079, A001477)" value="A000045">
                <button class="btn btn-primary" id="exploreBtn">🔍 Explore Sequence</button>
                <div style="margin-top: 0.5rem;">
                    <label style="font-size:0.7rem;">Search OEIS:</label>
                    <input type="text" id="searchQuery" placeholder="Search by name or ID...">
                    <button class="btn" id="searchBtn">Search</button>
                </div>
                <div id="searchResults" style="margin-top: 0.5rem; max-height: 200px; overflow-y: auto;"></div>
            `;
        }
        
        async function exploreSequence(id) {
            const resultsDiv = document.getElementById('resultsPanel');
            resultsDiv.innerHTML = '<div style="text-align:center;">📦 Loading sequence...</div>';
            
            try {
                const seq = await oeis.loadSequence(id);
                if (!seq) throw new Error('Sequence not found');
                
                // Generate first 20 values
                const values = seq.data.slice(0, 20);
                
                // Draw simple waveform
                const canvasId = 'waveformCanvas';
                resultsDiv.innerHTML = `
                    <div class="sequence-card">
                        <h3>📊 ${seq.id} — ${seq.name}</h3>
                        <div style="font-size:0.7rem; margin:0.3rem 0;">First 20 terms:</div>
                        <div style="font-family:monospace; font-size:0.7rem; background:var(--bg-primary); padding:0.5rem; overflow-x:auto;">${values.join(', ')}</div>
                        <canvas id="${canvasId}" width="400" height="80"></canvas>
                    </div>
                    <div class="sequence-card">
                        <h4>📐 Generating Function (E.g.f.)</h4>
                        <div class="generating-function" id="gfDisplay">Computing...</div>
                    </div>
                    <div class="sequence-card">
                        <h4>🔗 Related Sequences (Diagonals / Triangles)</h4>
                        <div id="relatedSeqs">Loading...</div>
                    </div>
                `;
                
                // Draw waveform
                const canvas = document.getElementById(canvasId);
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    const w = canvas.clientWidth, h = canvas.clientHeight;
                    canvas.width = w; canvas.height = h;
                    ctx.fillStyle = '#0a0a0f';
                    ctx.fillRect(0, 0, w, h);
                    if (values.length > 1) {
                        const minVal = Math.min(...values, 0);
                        const maxVal = Math.max(...values, 1);
                        const range = Math.max(maxVal - minVal, 0.01);
                        ctx.beginPath();
                        ctx.strokeStyle = '#6c63ff';
                        ctx.lineWidth = 2;
                        for (let i = 0; i < values.length; i++) {
                            const x = (i / (values.length - 1)) * w;
                            const y = h - ((values[i] - minVal) / range) * (h - 20) - 10;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                }
                
                // Generate generating function info
                const gfDiv = document.getElementById('gfDisplay');
                if (gfDiv) {
                    const gf = guessGeneratingFunction(seq.data);
                    gfDiv.innerHTML = gf;
                }
                
                // Find related sequences
                const relatedDiv = document.getElementById('relatedSeqs');
                if (relatedDiv) {
                    const related = await findRelatedSequences(seq.id);
                    relatedDiv.innerHTML = related;
                }
                
            } catch(e) {
                resultsDiv.innerHTML = `<div class="sequence-card" style="border-left-color:var(--accent-error);">❌ Error: ${e.message}</div>`;
            }
        }
        
        function guessGeneratingFunction(data) {
            // Simple heuristics for common generating functions
            const first = data.slice(0, 6);
            const isLinear = first.every((v, i) => i === 0 || v === first[0] + i);
            const isGeometric = first.slice(1).every((v, i) => i === 0 || Math.abs(v / first[i] - first[1]/first[0]) < 0.01);
            const isFibonacci = first[0] === 0 && first[1] === 1 && first[2] === 1 && first[3] === 2 && first[4] === 3;
            
            if (isLinear) return `📈 E.g.f: ${first[0]} + ${first[1]-first[0]}x<br>O.g.f: ${first[0]}/(1-x) + ${first[1]-first[0]}x/(1-x)^2`;
            if (isGeometric) return `⚡ E.g.f: ${first[0]} * exp(${Math.log(first[1]/first[0])}x)<br>O.g.f: ${first[0]}/(1-${first[1]/first[0]}x)`;
            if (isFibonacci) return `🌀 E.g.f: (exp(φx) - exp(-x/φ))/√5 where φ = (1+√5)/2<br>O.g.f: x/(1-x-x²)`;
            return `🔍 No simple closed form detected. First differences: ${first.slice(1).map((v,i) => v - first[i]).join(', ')}`;
        }
        
        async function findRelatedSequences(id) {
            // Find sequences that share common properties
            const related = [];
            const knownRelations = {
                'A000045': ['A000129', 'A001519', 'A000045'],
                'A000027': ['A001477', 'A000027'],
                'A000079': ['A000244', 'A000302']
            };
            
            const relations = knownRelations[id] || [id];
            return relations.map(rid => `<div class="cluster-tag" onclick="exploreSequence('${rid}')">${rid}</div>`).join('');
        }
        
        // ============================================
        // Mode 2: Bisimilarity Mining
        // ============================================
        function showBisimilarityControls() {
            return `
                <label style="font-size:0.7rem;">Comparison Depth (steps):</label>
                <input type="range" id="depthSlider" min="5" max="30" value="15">
                <span id="depthVal">15</span>
                <label style="font-size:0.7rem;">Min Cluster Size:</label>
                <input type="range" id="minSizeSlider" min="2" max="10" value="2">
                <span id="minSizeVal">2</span>
                <button class="btn btn-primary" id="mineBtn">⛏️ Mine Clusters</button>
                <div id="miningStatus" style="font-size:0.7rem; margin-top:0.5rem;"></div>
            `;
        }
        
        async function mineClusters() {
            const depth = parseInt(document.getElementById('depthSlider')?.value || 15);
            const minSize = parseInt(document.getElementById('minSizeSlider')?.value || 2);
            const statusDiv = document.getElementById('miningStatus');
            const resultsDiv = document.getElementById('resultsPanel');
            
            resultsDiv.innerHTML = '<div style="text-align:center;">⛏️ Mining bisimilarity clusters...</div>';
            statusDiv.innerHTML = 'Processing OEIS index...';
            
            // For demo, use a subset of sequences
            const testIds = ['A000027', 'A001477', 'A000045', 'A000079', 'A000142', 'A000217', 'A000290', 'A000034', 'A000108'];
            
            // Build similarity graph
            const clusters = [];
            const used = new Set();
            
            for (let i = 0; i < testIds.length; i++) {
                if (used.has(testIds[i])) continue;
                const cluster = [testIds[i]];
                const seq1 = await oeis.loadSequence(testIds[i]);
                
                for (let j = i + 1; j < testIds.length; j++) {
                    const seq2 = await oeis.loadSequence(testIds[j]);
                    // Simple equality check for first N terms
                    let match = true;
                    for (let k = 0; k < depth; k++) {
                        if (seq1.data[k] !== seq2.data[k]) {
                            match = false;
                            break;
                        }
                    }
                    if (match) {
                        cluster.push(testIds[j]);
                        used.add(testIds[j]);
                    }
                }
                
                if (cluster.length >= minSize) {
                    clusters.push(cluster);
                }
                used.add(testIds[i]);
            }
            
            // Display results
            if (clusters.length === 0) {
                resultsDiv.innerHTML = '<div class="sequence-card">No clusters found. Try smaller depth or min size.</div>';
            } else {
                resultsDiv.innerHTML = clusters.map((cluster, idx) => `
                    <div class="cluster-card">
                        <strong>📊 Class ${idx + 1}</strong> (${cluster.length} members)
                        <div class="cluster-members">
                            ${cluster.map(id => `<span class="cluster-tag" onclick="exploreSequence('${id}')">${id}</span>`).join('')}
                        </div>
                        <div style="font-size:0.65rem; margin-top:0.3rem;">💡 These sequences are indistinguishable for the first ${depth} steps.</div>
                    </div>
                `).join('');
            }
            
            statusDiv.innerHTML = `✅ Mining complete. Found ${clusters.length} clusters.`;
        }
        
        // ============================================
        // Mode 3: Combinatorial Web
        // ============================================
        function showCombinatorialControls() {
            return `
                <input type="text" id="webSeqId" placeholder="OEIS ID (A112007)" value="A112007">
                <button class="btn btn-primary" id="exploreWebBtn">🌐 Explore Web</button>
                <div style="margin-top:0.5rem;">
                    <label style="font-size:0.7rem;">Concept:</label>
                    <select id="conceptSelect">
                        <option value="triangles">Triangles containing this sequence</option>
                        <option value="diagonals">Diagonal sequences</option>
                        <option value="generating">Generating functions</option>
                    </select>
                </div>
            `;
        }
        
        async function exploreWeb() {
            const seqId = document.getElementById('webSeqId')?.value || 'A112007';
            const concept = document.getElementById('conceptSelect')?.value || 'triangles';
            const resultsDiv = document.getElementById('resultsPanel');
            
            resultsDiv.innerHTML = '<div style="text-align:center;">🌐 Exploring combinatorial web...</div>';
            
            // Known combinatorial relationships database
            const combinatorialData = {
                'A112007': {
                    name: 'Triangle of coefficients from (x - t*log(1+x))^(-1)',
                    triangles: ['A008275 (Stirling first kind)', 'A112007 itself'],
                    diagonals: ['See Bala\'s text: coefficients of numerator polynomials'],
                    generating: 'E.g.f: (x - t*log(1+x))^(-1)',
                    related: ['A008275', 'A008517', 'A111999'],
                    description: 'Diagonal triangle for Stirling numbers of the first kind'
                },
                'A008275': {
                    name: 'Stirling numbers of the first kind',
                    triangles: ['A008275', 'A112007 (its diagonals)'],
                    diagonals: ['A112007', 'A111999'],
                    generating: 'exp(t*log(1+x)) = (1+x)^t',
                    related: ['A112007', 'A008277']
                }
            };
            
            const data = combinatorialData[seqId] || {
                name: seqId,
                triangles: ['Data not yet in web database'],
                diagonals: ['Use OEIS API for full data'],
                generating: 'Unknown',
                related: []
            };
            
            resultsDiv.innerHTML = `
                <div class="sequence-card">
                    <h3>📐 ${seqId} — ${data.name}</h3>
                    <div style="margin-top:0.5rem;">
                        <h4>🔺 Triangles:</h4>
                        <div class="cluster-members">${data.triangles.map(t => `<span class="cluster-tag">${t}</span>`).join('')}</div>
                    </div>
                    <div style="margin-top:0.5rem;">
                        <h4>📊 Diagonals:</h4>
                        <div class="cluster-members">${data.diagonals.map(d => `<span class="cluster-tag">${d}</span>`).join('')}</div>
                    </div>
                    <div style="margin-top:0.5rem;">
                        <h4>📐 Generating Function:</h4>
                        <div class="generating-function">${data.generating}</div>
                    </div>
                    <div style="margin-top:0.5rem;">
                        <h4>🔗 Related Sequences:</h4>
                        <div class="cluster-members">${data.related.map(r => `<span class="cluster-tag" onclick="exploreSequence('${r}')">${r}</span>`).join('')}</div>
                    </div>
                    <div style="margin-top:0.5rem; font-size:0.7rem; color:var(--text-secondary);">
                        📖 From OEIS: ${data.description}
                    </div>
                </div>
                <div class="sequence-card">
                    <h4>📚 Reference</h4>
                    <div style="font-size:0.7rem;">
                        Peter Bala, "Diagonals of triangles with generating function exp(t*F(x))"<br>
                        <a href="https://oeis.org/A112007/a112007_Bala.txt" target="_blank" style="color:var(--accent-info);">Read the full text →</a>
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // Mode Switching & Initialization
        // ============================================
        function switchMode(mode) {
            currentMode = mode;
            const controlsPanel = document.getElementById('controlsPanel');
            const resultsPanel = document.getElementById('resultsPanel');
            
            if (mode === 'explorer') {
                controlsPanel.innerHTML = showExplorerControls();
                resultsPanel.innerHTML = '<div style="text-align: center; color: var(--text-secondary);">Enter an OEIS ID (e.g., A000045, A000079) to explore.</div>';
                document.getElementById('exploreBtn')?.addEventListener('click', () => {
                    const id = document.getElementById('seqId').value;
                    if (id) exploreSequence(id);
                });
                document.getElementById('searchBtn')?.addEventListener('click', async () => {
                    const query = document.getElementById('searchQuery').value;
                    if (query) {
                        const results = await oeis.search(query);
                        const resultsDiv = document.getElementById('searchResults');
                        resultsDiv.innerHTML = results.map(r => 
                            `<div class="cluster-tag" onclick="exploreSequence('${r.id}')">${r.id} — ${r.name}</div>`
                        ).join('');
                    }
                });
            } else if (mode === 'bisimilarity') {
                controlsPanel.innerHTML = showBisimilarityControls();
                resultsPanel.innerHTML = '<div style="text-align: center; color: var(--text-secondary);">Click "Mine Clusters" to discover bisimilarity classes.</div>';
                const depthSlider = document.getElementById('depthSlider');
                const minSizeSlider = document.getElementById('minSizeSlider');
                if (depthSlider) depthSlider.oninput = (e) => document.getElementById('depthVal').innerText = e.target.value;
                if (minSizeSlider) minSizeSlider.oninput = (e) => document.getElementById('minSizeVal').innerText = e.target.value;
                document.getElementById('mineBtn')?.addEventListener('click', mineClusters);
            } else if (mode === 'combinatorial') {
                controlsPanel.innerHTML = showCombinatorialControls();
                resultsPanel.innerHTML = '<div style="text-align: center; color: var(--text-secondary);">Enter an OEIS ID to explore its combinatorial web (triangles, diagonals, generating functions).</div>';
                document.getElementById('exploreWebBtn')?.addEventListener('click', exploreWeb);
            }
        }
        
        // Initialize
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchMode(btn.dataset.mode);
            });
        });
        
        // Make exploreSequence globally available
        window.exploreSequence = exploreSequence;
        
        // Load OEIS index on startup
        oeis.loadIndex().then(() => {
            console.log('OEIS ready');
            switchMode('explorer');
        }).catch(e => {
            console.warn('OEIS index not found, using fallback');
            switchMode('explorer');
        });
    </script>
</body>
</html>
